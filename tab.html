<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://libs.baidu.com/jquery/1.11.1/jquery.min.js"></script>
</head>

<body>
    <style>
        .contentwrap {
            width: 98%;
            margin: 0 auto;
            padding: 10px;
        }

        ul {
            list-style: none;
            margin: 0;
            padding-left: 20px;
        }

        ul.tab {
            border-bottom: 1px solid #ccc;
            padding-bottom: 1px;
            height: 30px;
            line-height: 30px;
            color: #696969;
        }

        ul.tab li {
            float: left;
            font-family: "微软雅黑";
            cursor: pointer;
            padding: 0px;


        }

        ul.tab li.li {
            padding: 0px 25px 0px;
            font-size: 13px;
            height: 30px;
            line-height: 30px;
            background: #F4F5F9;
            border-top: 1px solid #C5D0DC;
            border-left: 1px solid #C5D0DC;
            border-bottom: 1px solid #C5D0DC;

        }

        ul.tab li.current {
            border-bottom: 0px;
            border-top: 2px solid #7599DE;
            font-size: 13px;
            color: #343434;
            background: #FFFFFF;

        }

        ul.tab li.li:last-child {
            border-right: 1px solid #C5D0DC;
        }
    </style>
    </head>

    <body>
        <div id="contentwrap" class="contentwrap">
            <ul class="tab" id="tab">
                <li id="li_stage" class="li current"><span><a href="#!">tab1</a></span></li>
                <li id="li_class" class="li"><span><a href="#!">tab2</a></span></li>
                <li id="li_photo" class="li"><span><a href="#!">tab3</a></span></li>
            </ul>
        </div>
        <script>
            $(function () {
                $('#tab > li').on("click", function () {
                    var num = $(this).index();
                    //var src=basePath+urlArr[num];
                    $('#tab > li').each(function () {
                        if ($(this).index() == num) {
                            $(this).attr("class", "li current");
                        } else {
                            $(this).attr("class", "li");
                        }
                    });
                    //$('#classify_iframe').attr("src",src);
                });
            });
        </script>
    </body>

</html>
